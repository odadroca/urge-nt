name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: PHP tests + lint + audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite, mbstring, openssl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

      # Advisory until PB-7 clears the open dependency advisories
      # (DEP-03 league/commonmark). Flip to blocking once green.
      - name: Composer security audit
        run: composer audit --no-interaction
        continue-on-error: true

  frontend:
    name: Build + npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Advisory until PB-7 clears the open dependency advisories
      # (DEP-01 vite, DEP-02 postcss). Flip to blocking once green.
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
